databases:
  - name: pulseapi-db
    databaseName: pulseapi
    user: pulseapi
    plan: basic-256mb
    region: singapore

services:
  - type: web
    name: pulseapi-backend
    runtime: node
    rootDir: backend
    plan: starter
    region: singapore
    buildCommand: npm install && npm run prisma:generate
    preDeployCommand: npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /ready
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pulseapi-db
          property: connectionString
      - key: FRONTEND_ORIGIN
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL_DAYS
        value: 7
      - key: BCRYPT_ROUNDS
        value: 12
      - key: MAX_ENDPOINTS_PER_USER
        value: 20
      - key: LOG_LEVEL
        value: info
      - key: SCHEDULER_ENABLED
        value: true
      - key: SCHEDULER_CRON
        value: "* * * * *"
      - key: SCHEDULER_BATCH_SIZE
        value: 25
      - key: SCHEDULER_CONCURRENCY
        value: 5

  - type: web
    name: pulseapi-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
